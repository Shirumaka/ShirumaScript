<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShirumaScripts - Ultimate Cloud</title>
  <style>
    :root {
      --primary: #6366f1; --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6);
      --text: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
      --success: #22c55e; --heart: #f43f5e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); margin: 0; color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .bg-blur { position: fixed; width: 60vw; height: 60vw; background: var(--primary); filter: blur(150px); border-radius: 50%; z-index: -1; opacity: 0.1; top: -10%; left: -10%; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--primary); }

    .nav-actions { display: flex; align-items: center; gap: 1.2rem; }
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; font-size: 0.9rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #334155; color: white; }

    .user-menu-container { position: relative; }
    .avatar-btn { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); cursor: pointer; object-fit: cover; background: #334155; }
    .dropdown-menu { position: absolute; top: 55px; right: 0; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; width: 220px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    .dropdown-item { padding: 12px 16px; font-size: 0.9rem; cursor: pointer; border: none; background: none; color: white; text-align: left; }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--primary); }

    main { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
    .hero { text-align: center; margin-bottom: 3rem; }
    .hero h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; }
    .hero h1 span { color: var(--primary); }

    .search-container { position: relative; max-width: 500px; margin: 2rem auto; }
    .search-input { width: 100%; padding: 1.2rem 3.5rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 3rem; color: #fff; box-sizing: border-box; }

    .script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
    .script-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
    .game-tag { color: var(--primary); font-size: 0.85rem; font-weight: 700; margin-top: 5px; display: block; }
    .script-desc { color: var(--text-muted); font-size: 0.95rem; margin: 15px 0; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 15px; margin-top: auto; }
    .author-info { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; }
    .author-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #1e293b; padding: 2rem; border-radius: 20px; width: 95%; max-width: 500px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .form-control { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; box-sizing: border-box; margin-bottom: 5px;}
    .code-input { font-family: monospace; background: #0f172a; color: #38bdf8; }
    .preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-top: 10px; display: none; border: 2px solid var(--primary); }
  </style>
</head>
<body>
  <div class="bg-blur"></div>

  <header>
    <a href="#" class="logo">Shiruma<span>Scripts</span></a>
    <div class="nav-actions">
      <button class="btn btn-primary" id="postBtnMain">Post Script</button>
      <div class="user-menu-container">
        <img id="headerAvatar" class="avatar-btn" src="" onclick="toggleDropdown()">
        <div class="dropdown-menu" id="userDropdown"></div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Find your next <span>Script</span>.</h1>
      <p>Customizable Cloud Script Portal</p>
    </section>

    <div class="search-container">
      <input type="search" id="searchInput" class="search-input" placeholder="Search scripts...">
    </div>

    <div class="script-grid" id="scriptGrid"></div>
  </main>

  <div class="modal-overlay" id="profileEditModal">
    <div class="modal-content">
      <h2>Edit Profile</h2>
      <form id="profileEditForm">
        <div class="form-group"><label>Name</label><input type="text" id="editName" class="form-control" required></div>
        <div class="form-group"><label>Bio</label><textarea id="editBio" class="form-control" rows="3"></textarea></div>
        <div class="form-group">
          <label>Avatar Image</label>
          <input type="file" id="editFile" class="form-control" accept="image/*">
          <img id="editPreview" class="preview-img">
        </div>
        <div style="display:flex; justify-content: flex-end; gap:10px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('profileEditModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="postModal">
    <div class="modal-content">
      <h2>Post Script</h2>
      <form id="postForm">
        <input type="text" id="postTitle" class="form-control" placeholder="Title" required>
        <input type="text" id="postGame" class="form-control" placeholder="Game" required>
        <textarea id="postDesc" class="form-control" placeholder="Description"></textarea>
        <textarea id="postContent" class="form-control code-input" rows="5" placeholder="Lua Code" required></textarea>
        <div style="display:flex; justify-content: flex-end; gap:10px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('postModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Publish</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="userProfileModal">
    <div class="modal-content" style="text-align:center">
      <img id="viewAvatar" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); margin-bottom:1rem; object-fit:cover;">
      <h2 id="viewName"></h2>
      <p id="viewBio" style="color:var(--text-muted)"></p>
      <button class="btn btn-secondary" onclick="closeModal('userProfileModal')">Close</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqy2H40wFYd86zbFmPurvI8SsV1-x8luU",
      authDomain: "flutter-ai-playground-96c40.firebaseapp.com",
      projectId: "flutter-ai-playground-96c40",
      storageBucket: "flutter-ai-playground-96c40.firebasestorage.app",
      messagingSenderId: "1063688315774",
      appId: "1:1063688315774:web:1e5d77f259203c56b4c92f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;
    let scripts = [];

    // --- プロフィール同期 ---
    onAuthStateChanged(auth, async (user) => {
      const avatarImg = document.getElementById('headerAvatar');
      const menu = document.getElementById('userDropdown');
      
      if (user) {
        // Firestoreからユーザー情報を取得（なければ作成）
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          currentUserData = userDoc.data();
        } else {
          currentUserData = {
            uid: user.uid,
            name: user.displayName || "New User",
            bio: "No bio yet.",
            avatar: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`
          };
          await setDoc(doc(db, "users", user.uid), currentUserData);
        }
        
        avatarImg.src = currentUserData.avatar;
        menu.innerHTML = `
          <div style="padding:12px; font-size:0.8rem; border-bottom:1px solid var(--border)">
            <strong>${currentUserData.name}</strong>
          </div>
          <button class="dropdown-item" onclick="openProfileEdit()">⚙️ Edit Profile</button>
          <button class="dropdown-item" id="logoutBtn" style="color:#ef4444">🚪 Log Out</button>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
      } else {
        currentUserData = null;
        avatarImg.src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Guest";
        menu.innerHTML = `<button class="dropdown-item" onclick="alert('Please login first')">Login Required</button>`;
      }
      render();
    });

    // --- プロフィール編集処理 ---
    window.openProfileEdit = () => {
      document.getElementById('editName').value = currentUserData.name;
      document.getElementById('editBio').value = currentUserData.bio;
      document.getElementById('editPreview').src = currentUserData.avatar;
      document.getElementById('editPreview').style.display = 'block';
      openModal('profileEditModal');
    };

    document.getElementById('editFile').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('editPreview').src = ev.target.result;
        document.getElementById('editPreview').style.display = 'block';
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('profileEditForm').onsubmit = async (e) => {
      e.preventDefault();
      const updated = {
        name: document.getElementById('editName').value,
        bio: document.getElementById('editBio').value,
        avatar: document.getElementById('editPreview').src
      };
      await updateDoc(doc(db, "users", auth.currentUser.uid), updated);
      currentUserData = { ...currentUserData, ...updated };
      document.getElementById('headerAvatar').src = updated.avatar;
      closeModal('profileEditModal');
      render();
    };

    // --- スクリプト読み込み & 描画 ---
    onSnapshot(query(collection(db, "scripts"), orderBy("createdAt", "desc")), (snapshot) => {
      scripts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render();
    });

    window.render = () => {
      const grid = document.getElementById('scriptGrid');
      const term = document.getElementById('searchInput').value.toLowerCase();
      grid.innerHTML = '';

      scripts.filter(s => s.title.toLowerCase().includes(term)).forEach(s => {
        const isLiked = currentUserData && s.likedBy?.includes(auth.currentUser.uid);
        const card = document.createElement('div');
        card.className = 'script-card';
        card.innerHTML = `
          <div class="card-header"><h3>${s.title}</h3><span class="game-tag">${s.game}</span></div>
          <p class="script-desc">${s.desc}</p>
          <div style="display:flex; gap:15px; margin-bottom:10px;">
            <button class="btn" style="background:none; color:${isLiked ? '#f43f5e' : '#94a3b8'}" onclick="handleLike('${s.id}', ${isLiked})">${isLiked ? '❤️' : '🤍'} ${s.likes || 0}</button>
            <button class="btn" style="background:none; color:var(--primary); font-size:0.8rem;" onclick="toggleComments('${s.id}')">💬 ${s.comments?.length || 0} Comments</button>
          </div>
          <div id="comments-${s.id}" style="display:none; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-bottom:10px;">
            <div style="max-height:80px; overflow-y:auto; font-size:0.8rem; margin-bottom:5px;">
              ${(s.comments || []).map(c => `<div><strong>${c.u}:</strong> ${c.t}</div>`).join('')}
            </div>
            <div style="display:flex; gap:5px;">
              <input type="text" id="input-${s.id}" class="form-control" style="margin:0; padding:5px; font-size:0.8rem;" placeholder="Add comment...">
              <button class="btn btn-primary" style="padding:4px 8px;" onclick="handleAddComment('${s.id}')">Post</button>
            </div>
          </div>
          <div class="card-footer">
            <div class="author-info" onclick="showUser('${s.authorUid}')">
              <img src="${s.authorAvatar}" class="author-avatar"><span>${s.authorName}</span>
            </div>
            <button class="btn btn-primary" style="font-size:0.7rem; padding:5px 10px;" onclick="copyCode('${s.content.replace(/'/g, "\\'")}', this)">Copy Code</button>
          </div>
        `;
        grid.appendChild(card);
      });
    };

    // --- アクション ---
    window.handleLike = async (id, isLiked) => {
      if (!auth.currentUser) return alert("Login required");
      await updateDoc(doc(db, "scripts", id), {
        likes: increment(isLiked ? -1 : 1),
        likedBy: isLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
      });
    };

    window.handleAddComment = async (id) => {
      const input = document.getElementById(`input-${id}`);
      if (!currentUserData || !input.value.trim()) return;
      await updateDoc(doc(db, "scripts", id), {
        comments: arrayUnion({ u: currentUserData.name, t: input.value, uid: auth.currentUser.uid })
      });
      input.value = '';
    };

    document.getElementById('postForm').onsubmit = async (e) => {
      e.preventDefault();
      if (!currentUserData) return alert("Login required");
      await addDoc(collection(db, "scripts"), {
        title: document.getElementById('postTitle').value,
        game: document.getElementById('postGame').value,
        desc: document.getElementById('postDesc').value,
        content: document.getElementById('postContent').value,
        authorName: currentUserData.name,
        authorAvatar: currentUserData.avatar,
        authorUid: auth.currentUser.uid,
        likes: 0, likedBy: [], comments: [],
        createdAt: Date.now()
      });
      closeModal('postModal');
      e.target.reset();
    };

    // --- その他UI ---
    window.showUser = async (uid) => {
      const uDoc = await getDoc(doc(db, "users", uid));
      if(uDoc.exists()){
        const data = uDoc.data();
        document.getElementById('viewName').innerText = data.name;
        document.getElementById('viewAvatar').src = data.avatar;
        document.getElementById('viewBio').innerText = data.bio;
        openModal('userProfileModal');
      }
    };

    window.copyCode = (txt, btn) => { navigator.clipboard.writeText(txt); btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy Code', 1500); };
    window.toggleComments = (id) => { const el = document.getElementById(`comments-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleDropdown = () => { const d = document.getElementById('userDropdown'); d.style.display = d.style.display === 'flex' ? 'none' : 'flex'; };
    
    document.getElementById('postBtnMain').onclick = () => auth.currentUser ? openModal('postModal') : alert("Login required");
    document.getElementById('searchInput').oninput = render;
    window.onclick = (e) => { if(e.target.className === 'modal-overlay') e.target.style.display = 'none'; if(!e.target.closest('.user-menu-container')) document.getElementById('userDropdown').style.display = 'none'; };
  </script>
</body>
</html>
