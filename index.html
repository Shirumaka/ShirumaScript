<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShirumaScripts - Ultimate Edition</title>
  <style>
    :root {
      --primary: #6366f1; --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6);
      --text: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
      --danger: #ef4444; --success: #22c55e;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-gradient); margin: 0; color: var(--text); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); }
    .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; }
    .logo span { color: var(--primary); }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .btn { padding: 10px 22px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-secondary { background: #334155; color: white; }
    .avatar-btn { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); cursor: pointer; object-fit: cover; background: #1e293b; transition: 0.2s; }
    .avatar-btn:hover { transform: scale(1.05); }
    .dropdown-menu { position: absolute; top: 55px; right: 0; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; width: 240px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .dropdown-item { padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border: none; background: none; color: white; text-align: left; width: 100%; }
    .dropdown-item:hover { background: rgba(255,255,255,0.08); color: var(--primary); }
    main { padding: 2.5rem 5%; max-width: 1300px; margin: 0 auto; }
    .search-input { width: 100%; padding: 1.2rem 2.5rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 1rem; margin-bottom: 2.5rem; transition: 0.3s; }
    .search-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    
    /* グリッドレイアウト修正版 */
    .script-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
      gap: 24px; 
      align-items: start; /* これで高さが連動しなくなる */
    }

    .script-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; position: relative; display: flex; flex-direction: column; backdrop-filter: blur(8px); transition: 0.3s; }
    .script-card:hover { border-color: rgba(99, 102, 241, 0.4); transform: translateY(-3px); }
    .card-menu-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; padding: 5px; }
    .card-menu { position: absolute; top: 45px; right: 15px; background: #1e293b; border: 1px solid var(--border); border-radius: 10px; display: none; flex-direction: column; z-index: 10; overflow: hidden; }
    .game-tag { color: var(--primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
    .script-card h3 { margin: 0 0 10px 0; font-size: 1.3rem; }
    .script-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 15px; }
    .comment-section { background: rgba(15, 23, 42, 0.5); border-radius: 12px; padding: 12px; margin-top: 15px; display: none; border: 1px solid var(--border); }
    .comment-list { max-height: 180px; overflow-y: auto; margin-bottom: 12px; }
    .comment-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }
    .comment-content { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 0 12px 12px 12px; flex: 1; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .author-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
    .modal-content { background: #1e293b; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--border); }
    .form-control { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 0.95rem; }
    .preview-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--primary); }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">Shiruma<span>Scripts</span></a>
    <div class="nav-actions">
      <button class="btn btn-primary" id="postBtnMain">✨ 投稿する</button>
      <div style="position:relative;">
        <img id="headerAvatar" class="avatar-btn" src="" onclick="toggleDropdown(event)">
        <div class="dropdown-menu" id="userDropdown"></div>
      </div>
    </div>
  </header>

  <main>
    <input type="search" id="searchInput" class="search-input" placeholder="検索...">
    <div class="script-grid" id="scriptGrid"></div>
  </main>

  <div class="modal-overlay" id="profileEditModal">
    <div class="modal-content">
      <h2 style="margin-top:0">プロフィール設定</h2>
      <form id="profileEditForm">
        <input type="text" id="editName" class="form-control" placeholder="名前" required maxlength="15">
        <textarea id="editBio" class="form-control" placeholder="自己紹介" rows="3" maxlength="100"></textarea>
        <input type="file" id="editFile" class="form-control" accept="image/*">
        <div style="text-align:center"><img id="editPreview" class="preview-img"></div>
        <div style="display:flex; justify-content: flex-end; gap:12px; margin-top:10px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('profileEditModal')">閉じる</button>
          <button type="submit" id="profileSaveBtn" class="btn btn-primary">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="postModal">
    <div class="modal-content" style="max-width: 600px;">
      <h2 id="modalTitle" style="margin-top:0">スクリプト共有</h2>
      <form id="postForm">
        <input type="hidden" id="editDocId">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <input type="text" id="postTitle" class="form-control" placeholder="タイトル" required>
          <input type="text" id="postGame" class="form-control" placeholder="ゲーム" required>
        </div>
        <textarea id="postDesc" class="form-control" placeholder="説明"></textarea>
        <textarea id="postContent" class="form-control" style="font-family:monospace; font-size:0.85rem;" rows="8" placeholder="-- Lua Code" required></textarea>
        <div style="display:flex; justify-content: flex-end; gap:12px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('postModal')">キャンセル</button>
          <button type="submit" class="btn btn-primary">公開する</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="userProfileModal">
    <div class="modal-content" style="text-align:center">
      <img id="viewAvatar" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); margin-bottom:15px;">
      <h2 id="viewName" style="margin:0"></h2>
      <p id="viewBio" style="color:var(--text-muted); margin-bottom:20px;"></p>
      <button class="btn btn-secondary" onclick="closeModal('userProfileModal')" style="width:100%">閉じる</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByoNkpGI9CDR1fUTgl1C5n0FTjxfxwcHw",
      authDomain: "shiruma-script.firebaseapp.com",
      projectId: "shiruma-script",
      storageBucket: "shiruma-script.firebasestorage.app",
      messagingSenderId: "591684206523",
      appId: "1:591684206523:web:1b51261ac740fa6b97ce9e",
      measurementId: "G-QR6QK4YK57"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const LOGIN_PAGE = "https://shirumaka.github.io/ShirumaScriptLogin/";

    let currentUserData = null;
    let scripts = [];
    let userCache = {};
    let isRendering = false;

    // 画像圧縮 (120px)
    const resizeImage = (file) => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'); canvas.width = 120; canvas.height = 120;
          canvas.getContext('2d').drawImage(img, 0, 0, 120, 120);
          resolve(canvas.toDataURL('image/jpeg', 0.5));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    const getUserInfo = async (uid) => {
      if (userCache[uid]) return userCache[uid];
      const uDoc = await getDoc(doc(db, "users", uid));
      if (uDoc.exists()) { userCache[uid] = uDoc.data(); return userCache[uid]; }
      return { name: "不明", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" };
    };

    const updateHeader = () => {
      const avatarBtn = document.getElementById('headerAvatar');
      const dropdown = document.getElementById('userDropdown');
      if (currentUserData) {
        avatarBtn.src = currentUserData.avatar;
        dropdown.innerHTML = `<button class="dropdown-item" onclick="openProfileEdit()">⚙️ プロフィール設定</button><button class="dropdown-item" id="logoutBtn" style="color:var(--danger)">🚪 ログアウト</button>`;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
      } else {
        avatarBtn.src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Guest";
        dropdown.innerHTML = `<button class="dropdown-item" onclick="window.location.href='${LOGIN_PAGE}'">🔑 ログイン</button>`;
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const uDoc = await getDoc(doc(db, "users", user.uid));
        currentUserData = uDoc.exists() ? uDoc.data() : { uid: user.uid, name: user.displayName || "新人", bio: "", avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}` };
        if(!uDoc.exists()) await setDoc(doc(db, "users", user.uid), currentUserData);
        userCache[user.uid] = currentUserData;
      } else { currentUserData = null; }
      updateHeader(); render();
    });

    onSnapshot(query(collection(db, "scripts"), orderBy("createdAt", "desc")), (snapshot) => {
      scripts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render();
    });

    window.render = async () => {
      if (isRendering) return; isRendering = true;
      const grid = document.getElementById('scriptGrid');
      const term = document.getElementById('searchInput').value.toLowerCase();
      grid.innerHTML = '';
      for (const s of scripts) {
        if (!s.title.toLowerCase().includes(term) && !s.game.toLowerCase().includes(term)) continue;
        const author = await getUserInfo(s.authorUid);
        const isMine = auth.currentUser && s.authorUid === auth.currentUser.uid;
        const isLiked = auth.currentUser && s.likedBy?.includes(auth.currentUser.uid);
        const card = document.createElement('div');
        card.className = 'script-card';
        card.innerHTML = `
          ${isMine ? `<button class="card-menu-btn" onclick="toggleCardMenu(event, '${s.id}')">⋮</button><div class="card-menu" id="menu-${s.id}"><button class="dropdown-item" onclick="openEditModal('${s.id}')">編集</button><button class="dropdown-item" style="color:var(--danger)" onclick="handleDelete(event, '${s.id}')">削除</button></div>` : ''}
          <span class="game-tag">${s.game}</span><h3>${s.title}</h3><div class="script-desc">${s.desc || '説明なし'}</div>
          <div style="display:flex; gap:15px;">
            <button class="btn" style="background:none; padding:5px 0; color:${isLiked ? 'var(--danger)' : 'var(--text-muted)'}" onclick="handleLike(event, '${s.id}', ${isLiked})">${isLiked ? '❤️' : '🤍'} ${s.likes || 0}</button>
            <button class="btn" style="background:none; padding:5px 0; color:var(--primary)" onclick="toggleComments(event, '${s.id}')">💬 ${s.comments?.length || 0}</button>
          </div>
          <div id="comments-${s.id}" class="comment-section">
            <div class="comment-list" id="list-${s.id}"></div>
            <div style="display:flex; gap:8px;"><input type="text" id="input-${s.id}" class="form-control" style="margin:0; font-size:0.8rem;" placeholder="コメント..." onclick="event.stopPropagation()"><button class="btn btn-primary" style="padding:4px 12px;" onclick="handleAddComment(event, '${s.id}')">送信</button></div>
          </div>
          <div class="card-footer">
            <div class="author-info" onclick="showUser(event, '${s.authorUid}')"><img src="${author.avatar}" class="author-avatar"><span>${author.name}</span></div>
            <button class="btn btn-primary" style="padding:8px 16px; border-radius:8px" onclick="copyCode(event, '${s.id}', this)">📋 コピー</button>
          </div>
        `;
        grid.appendChild(card);
        const cl = document.getElementById(`list-${s.id}`);
        if(s.comments) for(const c of s.comments) {
          const ca = await getUserInfo(c.uid);
          cl.innerHTML += `<div class="comment-item"><img src="${ca.avatar}" class="comment-avatar"><div class="comment-content"><b>${ca.name}</b>: ${c.t}</div></div>`;
        }
      }
      isRendering = false;
    };

    document.getElementById('profileEditForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('profileSaveBtn');
      btn.disabled = true; btn.textContent = "保存中...";
      try {
        const upd = { name: document.getElementById('editName').value, bio: document.getElementById('editBio').value, avatar: document.getElementById('editPreview').src };
        await updateDoc(doc(db, "users", auth.currentUser.uid), upd);
        currentUserData = { ...currentUserData, ...upd }; userCache[auth.currentUser.uid] = currentUserData;
        updateHeader(); render(); closeModal('profileEditModal');
        alert("プロフィールを更新しました！");
      } catch (err) { alert("エラーが発生しました。"); }
      finally { btn.disabled = false; btn.textContent = "保存する"; }
    };

    window.handleLike = async (e, id, isLiked) => { e.stopPropagation(); if(!auth.currentUser) return window.location.href=LOGIN_PAGE; await updateDoc(doc(db, "scripts", id), { likes: increment(isLiked ? -1 : 1), likedBy: isLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); };
    window.handleAddComment = async (e, id) => { e.stopPropagation(); const i = document.getElementById(`input-${id}`); const t = i.value.trim(); if(!auth.currentUser) return window.location.href=LOGIN_PAGE; if(t.length<1) return; await updateDoc(doc(db, "scripts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, t, createdAt: Date.now() }) }); i.value=''; };
    window.copyCode = (e, id, btn) => { e.stopPropagation(); const s = scripts.find(x => x.id === id); navigator.clipboard.writeText(s.content).then(() => { const old = btn.innerHTML; btn.innerHTML = "✔️ OK!"; setTimeout(() => btn.innerHTML = old, 1500); }); };
    window.handleDelete = async (e, id) => { e.stopPropagation(); if(confirm("削除しますか？")) await deleteDoc(doc(db, "scripts", id)); };
    window.openProfileEdit = () => { document.getElementById('editName').value = currentUserData.name; document.getElementById('editBio').value = currentUserData.bio; document.getElementById('editPreview').src = currentUserData.avatar; document.getElementById('editPreview').style.display='block'; openModal('profileEditModal'); };
    document.getElementById('editFile').onchange = async (e) => { if(e.target.files[0]) { const res = await resizeImage(e.target.files[0]); document.getElementById('editPreview').src = res; document.getElementById('editPreview').style.display='block'; } };
    document.getElementById('postForm').onsubmit = async (e) => { e.preventDefault(); const id = document.getElementById('editDocId').value; const data = { title: document.getElementById('postTitle').value, game: document.getElementById('postGame').value, desc: document.getElementById('postDesc').value, content: document.getElementById('postContent').value, updatedAt: Date.now() }; if(id) await updateDoc(doc(db, "scripts", id), data); else await addDoc(collection(db, "scripts"), { ...data, authorUid: auth.currentUser.uid, likes:0, likedBy:[], comments:[], createdAt: Date.now() }); closeModal('postModal'); };
    window.toggleComments = (e, id) => { e.stopPropagation(); const el = document.getElementById(`comments-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleDropdown = (e) => { e.stopPropagation(); const d = document.getElementById('userDropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };
    window.toggleCardMenu = (e, id) => { e.stopPropagation(); const m = document.getElementById(`menu-${id}`); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
    window.openEditModal = (id) => { const s = scripts.find(x => x.id === id); document.getElementById('editDocId').value = id; document.getElementById('postTitle').value = s.title; document.getElementById('postGame').value = s.game; document.getElementById('postDesc').value = s.desc; document.getElementById('postContent').value = s.content; document.getElementById('modalTitle').innerText = "スクリプトの編集"; openModal('postModal'); };
    window.showUser = async (e, uid) => { e.stopPropagation(); const u = await getUserInfo(uid); document.getElementById('viewName').innerText = u.name; document.getElementById('viewAvatar').src = u.avatar; document.getElementById('viewBio').innerText = u.bio || "自己紹介なし"; openModal('userProfileModal'); };
    document.getElementById('postBtnMain').onclick = () => { if(!auth.currentUser) return window.location.href=LOGIN_PAGE; document.getElementById('modalTitle').innerText = "スクリプト共有"; document.getElementById('postForm').reset(); document.getElementById('editDocId').value=""; openModal('postModal'); };
    document.getElementById('searchInput').oninput = render;
    window.onclick = () => { document.getElementById('userDropdown').style.display='none'; document.querySelectorAll('.card-menu').forEach(m => m.style.display='none'); };
  </script>
</body>
</html>
