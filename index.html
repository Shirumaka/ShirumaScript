<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShirumaScripts</title>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
}

.btn{
background:#6366f1;
border:none;
color:white;
padding:8px 14px;
cursor:pointer;
border-radius:6px;
}

.script-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.script-card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.comment-section{
margin-top:10px;
display:none;
}

.form-control{
width:100%;
padding:8px;
margin-bottom:8px;
background:#020617;
border:1px solid #334155;
color:white;
}

</style>
</head>

<body>

<header>
<h2>ShirumaScripts</h2>
<button class="btn" id="postBtnMain">投稿</button>
</header>

<div class="script-grid" id="scriptGrid"></div>

<div id="postModal" style="display:none">

<input id="postTitle" class="form-control" placeholder="タイトル" maxlength="60">

<input id="postGame" class="form-control" placeholder="ゲーム" maxlength="40">

<textarea id="postDesc" class="form-control" placeholder="説明" maxlength="300"></textarea>

<textarea id="postContent" class="form-control" placeholder="コード" maxlength="5000"></textarea>

<button class="btn" id="submitBtn">投稿</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
arrayUnion,
increment
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAqy2H40wFYd86zbFmPurvI8SsV1-x8luU",
authDomain:"flutter-ai-playground-96c40.firebaseapp.com",
projectId:"flutter-ai-playground-96c40"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

let scripts=[];

let lastPostTime=0;
let lastCommentTime=0;

/* NGワード */

const bannedWords=[
"fuck",
"shit",
"porn",
"sex",
"nigger",
"kill",
"die"
];

/* 判定 */

function badWord(text){

const t=text.toLowerCase();

return bannedWords.some(w=>t.includes(w));

}

function spam(text){

const url=(text.match(/http/g)||[]).length;

if(url>=3)return true;

if(text.length>2000)return true;

return false;

}

/* 投稿 */

document.getElementById("submitBtn").onclick=async()=>{

if(!auth.currentUser)return;

if(Date.now()-lastPostTime<30000){

alert("投稿は30秒待ってください");

return;

}

const title=document.getElementById("postTitle").value.trim();
const game=document.getElementById("postGame").value.trim();
const desc=document.getElementById("postDesc").value.trim();
const content=document.getElementById("postContent").value.trim();

if(!title||!content){

alert("入力してください");

return;

}

if(badWord(title)||badWord(desc)||badWord(content)){

alert("禁止ワード");

return;

}

if(spam(title)||spam(desc)){

alert("スパム検出");

return;

}

if(content.length<10){

alert("コード短すぎ");

return;

}

/* 投稿上限 */

const userPosts=scripts.filter(s=>s.authorUid===auth.currentUser.uid).length;

if(userPosts>=20){

alert("投稿上限");

return;

}

lastPostTime=Date.now();

await addDoc(collection(db,"scripts"),{

title,
game,
desc,
content,

authorUid:auth.currentUser.uid,

likes:0,
likedBy:[],
comments:[],

createdAt:Date.now()

});

};

/* コメント */

window.addComment=async(id)=>{

if(!auth.currentUser)return;

if(Date.now()-lastCommentTime<5000){

alert("コメントは5秒待ってください");

return;

}

const input=document.getElementById("c-"+id);

const text=input.value.trim();

if(!text)return;

if(text.length>120){

alert("長すぎ");

return;

}

if(badWord(text)){

alert("禁止ワード");

return;

}

if(spam(text)){

alert("スパム");

return;

}

lastCommentTime=Date.now();

await updateDoc(doc(db,"scripts",id),{

comments:arrayUnion({

t:text,
uid:auth.currentUser.uid

})

});

input.value="";

};

/* 表示 */

onSnapshot(

query(collection(db,"scripts"),orderBy("createdAt","desc")),

(snap)=>{

scripts=snap.docs.map(d=>({

id:d.id,
...d.data()

}));

render();

}

);

/* 描画 */

function render(){

const grid=document.getElementById("scriptGrid");

grid.innerHTML="";

scripts.forEach(s=>{

const el=document.createElement("div");

el.className="script-card";

el.innerHTML=`

<h3>${s.title}</h3>

<p>${s.desc||""}</p>

<button onclick="toggle('${s.id}')">

コメント (${s.comments?.length||0})

</button>

<div class="comment-section" id="com-${s.id}">

${(s.comments||[]).map(c=>`

<div>${c.t}</div>

`).join("")}

<input id="c-${s.id}" class="form-control">

<button onclick="addComment('${s.id}')">送信</button>

</div>

`;

grid.appendChild(el);

});

}

/* コメント表示 */

window.toggle=id=>{

const el=document.getElementById("com-"+id);

el.style.display=el.style.display==="block"?"none":"block";

};

</script>

</body>
</html>
