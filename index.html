<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShirumaScripts - Ultimate Edition</title>
  <style>
    :root {
      --primary: #6366f1; --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6);
      --text: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
      --danger: #ef4444; --success: #22c55e;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-gradient); margin: 0; color: var(--text); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
    .bg-blur { position: fixed; width: 60vw; height: 60vw; background: var(--primary); filter: blur(150px); border-radius: 50%; z-index: -1; opacity: 0.1; top: -10%; left: -10%; pointer-events: none; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); }
    .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: var(--primary); }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .btn { padding: 10px 22px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
    .btn-primary:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.6; }
    .btn-secondary { background: #334155; color: white; }
    .btn-secondary:hover { background: #475569; }
    .avatar-btn { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); cursor: pointer; object-fit: cover; transition: 0.2s; background: #1e293b; }
    .avatar-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }
    .dropdown-menu { position: absolute; top: 55px; right: 0; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; width: 240px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
    .dropdown-item { padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border: none; background: none; color: white; text-align: left; width: 100%; transition: 0.2s; }
    .dropdown-item:hover { background: rgba(255,255,255,0.08); color: var(--primary); }
    main { padding: 2.5rem 5%; max-width: 1300px; margin: 0 auto; }
    .search-input { width: 100%; padding: 1.2rem 2.5rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 1rem; transition: 0.3s; margin-bottom: 2.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .search-input:focus { outline: none; border-color: var(--primary); background: rgba(30, 41, 59, 0.9); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    .script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
    .script-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; position: relative; display: flex; flex-direction: column; transition: all 0.3s ease; backdrop-filter: blur(8px); }
    .script-card:hover { transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.4); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .card-menu-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; padding: 5px; border-radius: 50%; transition: 0.2s; }
    .card-menu-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .card-menu { position: absolute; top: 45px; right: 15px; background: #1e293b; border: 1px solid var(--border); border-radius: 10px; display: none; flex-direction: column; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.4); overflow: hidden; }
    .game-tag { color: var(--primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .script-card h3 { margin: 0 0 10px 0; font-size: 1.3rem; font-weight: 700; color: #fff; }
    .script-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 15px; min-height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .comment-section { background: rgba(15, 23, 42, 0.5); border-radius: 12px; padding: 12px; margin-top: 15px; display: none; border: 1px solid var(--border); }
    .comment-list { max-height: 180px; overflow-y: auto; margin-bottom: 12px; scrollbar-width: thin; }
    .comment-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; animation: fadeIn 0.3s ease; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }
    .comment-content { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 0 12px 12px 12px; flex: 1; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
    .author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
    .author-info:hover { opacity: 0.8; transform: translateX(2px); }
    .author-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; animation: fadeIn 0.2s ease; }
    .modal-content { background: #1e293b; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--border); position: relative; }
    .form-control { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 0.95rem; transition: 0.2s; }
    .form-control:focus { border-color: var(--primary); outline: none; background: rgba(30, 41, 59, 0.8); }
    .preview-img-container { text-align: center; margin: 10px 0; }
    .preview-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto; border: 3px solid var(--primary); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-blur"></div>
  <header>
    <a href="#" class="logo">Shiruma<span>Scripts</span></a>
    <div class="nav-actions">
      <button class="btn btn-primary" id="postBtnMain">✨ 投稿する</button>
      <div style="position:relative;">
        <img id="headerAvatar" class="avatar-btn" src="" onclick="toggleDropdown(event)">
        <div class="dropdown-menu" id="userDropdown"></div>
      </div>
    </div>
  </header>

  <main>
    <input type="search" id="searchInput" class="search-input" placeholder="ほしいスクリプトやゲーム名で検索...">
    <div class="script-grid" id="scriptGrid"></div>
  </main>

  <div class="modal-overlay" id="profileEditModal">
    <div class="modal-content">
      <h2 style="margin-top:0">プロフィール設定</h2>
      <form id="profileEditForm">
        <label style="font-size:0.8rem; color:var(--text-muted)">表示名</label>
        <input type="text" id="editName" class="form-control" placeholder="名前" required maxlength="15">
        <label style="font-size:0.8rem; color:var(--text-muted)">自己紹介</label>
        <textarea id="editBio" class="form-control" placeholder="あなたの活動について教えてください" rows="3" maxlength="150"></textarea>
        <label style="font-size:0.8rem; color:var(--text-muted)">アバター変更</label>
        <input type="file" id="editFile" class="form-control" accept="image/*">
        <div class="preview-img-container"><img id="editPreview" class="preview-img"></div>
        <div style="display:flex; justify-content: flex-end; gap:12px; margin-top:10px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('profileEditModal')">閉じる</button>
          <button type="submit" id="profileSaveBtn" class="btn btn-primary">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="postModal">
    <div class="modal-content" style="max-width: 600px;">
      <h2 id="modalTitle" style="margin-top:0">スクリプトの共有</h2>
      <form id="postForm">
        <input type="hidden" id="editDocId">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <input type="text" id="postTitle" class="form-control" placeholder="タイトル" required>
          <input type="text" id="postGame" class="form-control" placeholder="対象ゲーム" required>
        </div>
        <textarea id="postDesc" class="form-control" placeholder="このスクリプトで何ができますか？" rows="2"></textarea>
        <textarea id="postContent" class="form-control" style="font-family:'Cascadia Code', monospace; font-size:0.85rem;" rows="8" placeholder="-- Lua Code Here" required></textarea>
        <div style="display:flex; justify-content: flex-end; gap:12px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('postModal')">キャンセル</button>
          <button type="submit" id="postSubmitBtn" class="btn btn-primary">公開する</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="userProfileModal">
    <div class="modal-content" style="text-align:center">
      <img id="viewAvatar" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); margin-bottom:15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
      <h2 id="viewName" style="margin:0 0 5px 0"></h2>
      <p id="viewBio" style="color:var(--text-muted); font-size:0.95rem; margin-bottom:20px; white-space: pre-wrap;"></p>
      <button class="btn btn-secondary" onclick="closeModal('userProfileModal')" style="width:100%; justify-content:center">閉じる</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByoNkpGI9CDR1fUTgl1C5n0FTjxfxwcHw",
      authDomain: "shiruma-script.firebaseapp.com",
      projectId: "shiruma-script",
      storageBucket: "shiruma-script.firebasestorage.app",
      messagingSenderId: "591684206523",
      appId: "1:591684206523:web:1b51261ac740fa6b97ce9e",
      measurementId: "G-QR6QK4YK57"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const LOGIN_PAGE = "https://shirumaka.github.io/ShirumaScriptLogin/";

    let currentUserData = null;
    let scripts = [];
    let userCache = {};
    let isRendering = false;

    // 画像圧縮処理の強化 (120px)
    const resizeImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 120; canvas.height = 120;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 120, 120);
            resolve(canvas.toDataURL('image/jpeg', 0.5));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const getUserInfo = async (uid) => {
      if (userCache[uid]) return userCache[uid];
      try {
        const uDoc = await getDoc(doc(db, "users", uid));
        if (uDoc.exists()) { userCache[uid] = uDoc.data(); return userCache[uid]; }
      } catch(e) {}
      return { name: "不明なユーザー", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" };
    };

    const updateHeader = () => {
      const avatarBtn = document.getElementById('headerAvatar');
      const dropdown = document.getElementById('userDropdown');
      if (currentUserData) {
        avatarBtn.src = currentUserData.avatar;
        dropdown.innerHTML = `
          <div style="padding:15px; font-size:0.8rem; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.03)">
            <div style="color:var(--text-muted)">ログイン中</div>
            <div style="font-weight:700; color:var(--primary); font-size:0.95rem">${currentUserData.name}</div>
          </div>
          <button class="dropdown-item" onclick="openProfileEdit()">⚙️ プロフィール設定</button>
          <button class="dropdown-item" id="logoutBtn" style="color:var(--danger)">🚪 ログアウト</button>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
      } else {
        avatarBtn.src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Guest";
        dropdown.innerHTML = `<button class="dropdown-item" onclick="window.location.href='${LOGIN_PAGE}'">🔑 ログイン / 新規登録</button>`;
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const uDoc = await getDoc(doc(db, "users", user.uid));
        currentUserData = uDoc.exists() ? uDoc.data() : { uid: user.uid, name: user.displayName || "新人スクリプター", bio: "", avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}` };
        if(!uDoc.exists()) await setDoc(doc(db, "users", user.uid), currentUserData);
        userCache[user.uid] = currentUserData;
      } else { currentUserData = null; }
      updateHeader();
      render();
    });

    onSnapshot(query(collection(db, "scripts"), orderBy("createdAt", "desc")), (snapshot) => {
      scripts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render();
    });

    window.render = async () => {
      if (isRendering) return; isRendering = true;
      const grid = document.getElementById('scriptGrid');
      const term = document.getElementById('searchInput').value.toLowerCase();
      grid.innerHTML = '';

      for (const s of scripts) {
        if (!s.title.toLowerCase().includes(term) && !s.game.toLowerCase().includes(term)) continue;
        const author = await getUserInfo(s.authorUid);
        const isMine = auth.currentUser && s.authorUid === auth.currentUser.uid;
        const isLiked = auth.currentUser && s.likedBy?.includes(auth.currentUser.uid);
        
        const card = document.createElement('div');
        card.className = 'script-card';
        card.innerHTML = `
          ${isMine ? `<button class="card-menu-btn" onclick="toggleCardMenu(event, '${s.id}')">⋮</button><div class="card-menu" id="menu-${s.id}"><button class="dropdown-item" onclick="openEditModal('${s.id}')">編集する</button><button class="dropdown-item" style="color:var(--danger)" onclick="handleDelete(event, '${s.id}')">削除する</button></div>` : ''}
          <span class="game-tag">${s.game}</span><h3>${s.title}</h3><div class="script-desc">${s.desc || '説明はありません'}</div>
          <div style="display:flex; gap:15px; margin-bottom: 5px;">
            <button class="btn" style="background:none; padding:5px 0; color:${isLiked ? 'var(--danger)' : 'var(--text-muted)'}" onclick="handleLike(event, '${s.id}', ${isLiked})">${isLiked ? '❤️' : '🤍'} <b>${s.likes || 0}</b></button>
            <button class="btn" style="background:none; padding:5px 0; color:var(--primary)" onclick="toggleComments(event, '${s.id}')">💬 <b>${s.comments?.length || 0}</b></button>
          </div>
          <div id="comments-${s.id}" class="comment-section">
            <div class="comment-list" id="list-${s.id}"></div>
            <div style="display:flex; gap:8px;"><input type="text" id="input-${s.id}" class="form-control" style="margin:0; font-size:0.8rem;" placeholder="コメントを書く..." onclick="event.stopPropagation()"><button class="btn btn-primary" style="padding:6px 12px;" onclick="handleAddComment(event, '${s.id}')">送信</button></div>
          </div>
          <div class="card-footer">
            <div class="author-info" onclick="showUser(event, '${s.authorUid}')"><img src="${author.avatar}" class="author-avatar"><span>${author.name}</span></div>
            <button class="btn btn-primary" style="padding:8px 16px; border-radius:8px" onclick="copyCode(event, '${s.id}', this)">📋 コピー</button>
          </div>
        `;
        grid.appendChild(card);
        const cl = document.getElementById(`list-${s.id}`);
        if(s.comments) for(const c of s.comments) {
          const ca = await getUserInfo(c.uid);
          cl.innerHTML += `<div class="comment-item"><img src="${ca.avatar}" class="comment-avatar"><div class="comment-content"><b>${ca.name}</b><br>${c.t}</div></div>`;
        }
      }
      isRendering = false;
    };

    // 保存処理 (updateProfileを廃止し、Firestoreのみを更新するように最適化)
    document.getElementById('profileEditForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('profileSaveBtn');
      btn.disabled = true; btn.innerHTML = "処理中...";
      try {
        const uid = auth.currentUser.uid;
        const upd = { 
          name: document.getElementById('editName').value, 
          bio: document.getElementById('editBio').value, 
          avatar: document.getElementById('editPreview').src 
        };
        await updateDoc(doc(db, "users", uid), upd);
        currentUserData = { ...currentUserData, ...upd };
        userCache[uid] = currentUserData;
        updateHeader(); render(); closeModal('profileEditModal');
        alert("プロフィールを更新しました！");
      } catch (err) { alert("エラーが発生しました。"); }
      finally { btn.disabled = false; btn.innerHTML = "保存する"; }
    };

    window.handleLike = async (e, id, isLiked) => { e.stopPropagation(); if(!auth.currentUser) return window.location.href=LOGIN_PAGE; await updateDoc(doc(db, "scripts", id), { likes: increment(isLiked ? -1 : 1), likedBy: isLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); };
    window.handleAddComment = async (e, id) => { e.stopPropagation(); const i = document.getElementById(`input-${id}`); const t = i.value.trim(); if(!auth.currentUser) return window.location.href=LOGIN_PAGE; if(t.length<1) return; await updateDoc(doc(db, "scripts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, t, createdAt: Date.now() }) }); i.value=''; };
    window.copyCode = (e, id, btn) => { e.stopPropagation(); const s = scripts.find(x => x.id === id); navigator.clipboard.writeText(s.content).then(() => { const old = btn.innerHTML; btn.style.background = "var(--success)"; btn.innerHTML = "✔️ OK!"; setTimeout(() => { btn.style.background = ""; btn.innerHTML = old; }, 1500); }); };
    window.handleDelete = async (e, id) => { e.stopPropagation(); if(confirm("このスクリプトを削除してもよろしいですか？")) await deleteDoc(doc(db, "scripts", id)); };
    window.openProfileEdit = () => { document.getElementById('editName').value = currentUserData.name; document.getElementById('editBio').value = currentUserData.bio; document.getElementById('editPreview').src = currentUserData.avatar; document.getElementById('editPreview').style.display='block'; openModal('profileEditModal'); };
    document.getElementById('editFile').onchange = async (e) => { if(e.target.files[0]) { const res = await resizeImage(e.target.files[0]); document.getElementById('editPreview').src = res; document.getElementById('editPreview').style.display='block'; } };
    document.getElementById('postForm').onsubmit = async (e) => { e.preventDefault(); const id = document.getElementById('editDocId').value; const data = { title: document.getElementById('postTitle').value, game: document.getElementById('postGame').value, desc: document.getElementById('postDesc').value, content: document.getElementById('postContent').value, updatedAt: Date.now() }; if(id) await updateDoc(doc(db, "scripts", id), data); else await addDoc(collection(db, "scripts"), { ...data, authorUid: auth.currentUser.uid, likes:0, likedBy:[], comments:[], createdAt: Date.now() }); closeModal('postModal'); e.target.reset(); };
    window.toggleComments = (e, id) => { e.stopPropagation(); const el = document.getElementById(`comments-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; };
    window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    window.toggleDropdown = (e) => { e.stopPropagation(); const d = document.getElementById('userDropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };
    window.toggleCardMenu = (e, id) => { e.stopPropagation(); const m = document.getElementById(`menu-${id}`); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
    window.openEditModal = (id) => { const s = scripts.find(x => x.id === id); document.getElementById('editDocId').value = id; document.getElementById('postTitle').value = s.title; document.getElementById('postGame').value = s.game; document.getElementById('postDesc').value = s.desc; document.getElementById('postContent').value = s.content; document.getElementById('modalTitle').innerText = "スクリプトの編集"; openModal('postModal'); };
    window.showUser = async (e, uid) => { e.stopPropagation(); const u = await getUserInfo(uid); document.getElementById('viewName').innerText = u.name; document.getElementById('viewAvatar').src = u.avatar; document.getElementById('viewBio').innerText = u.bio || "このユーザーはまだ自己紹介を書いていません。"; openModal('userProfileModal'); };
    document.getElementById('postBtnMain').onclick = () => { if(!auth.currentUser) return window.location.href=LOGIN_PAGE; document.getElementById('editDocId').value=""; document.getElementById('modalTitle').innerText = "スクリプトの共有"; document.getElementById('postForm').reset(); openModal('postModal'); };
    document.getElementById('searchInput').oninput = render;
    window.onclick = () => { document.getElementById('userDropdown').style.display='none'; document.querySelectorAll('.card-menu').forEach(m => m.style.display='none'); };
  </script>
</body>
</html>
